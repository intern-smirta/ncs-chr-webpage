<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWMS — Clinic Health Report | February 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.6;color:#2D3748;background:linear-gradient(135deg,#f0f4f8,#e8ecf1);min-height:100vh}
nav{background:#1B2A4A;color:white;padding:12px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2dd4bf,#14b8a6);display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:14px}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-brand{font-weight:700;font-size:16px}
.nav-sub{color:#94a3b8;font-size:13px;margin-left:4px}
.nav-right{display:flex;align-items:center;gap:14px;font-size:13px}
.nav-client{color:#94a3b8}
.nav-badge{background:#2C7A7B;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;color:white}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
h1{font-size:28px;font-weight:800;color:#0f172a;letter-spacing:-.5px;margin:0}
.page-sub{color:#4A5568;margin-top:4px;font-size:13px;margin-bottom:28px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.card{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8;margin:0}
.card-val{font-size:30px;font-weight:800;letter-spacing:-1px;margin:4px 0 2px;color:#0f172a}
.card-val.good{color:#276749}
.card-sub{font-size:11px;color:#94a3b8;margin:0}
.kpi-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.kpi-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #E2E8F0}
.kpi-bar{height:6px}
.kpi-inner{padding:20px 24px;text-align:center}
.kpi-title{font-size:14px;font-weight:600;color:#475569;margin:0 0 12px}
.kpi-value{font-size:32px;font-weight:800;letter-spacing:-1px;margin:0 0 6px}
.kpi-change{font-size:12px;font-weight:600;margin:0}
.kpi-change.good{color:#16a34a}
.kpi-change.bad{color:#dc2626}
.kpi-change.none{color:#A0AEC0}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:white;border-radius:12px;padding:4px;border:1px solid #E2E8F0;width:fit-content}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:#4A5568;transition:all .2s}
.tab.active{background:#1B2A4A;color:white}
.tab-content{display:none}
.tab-content.active{display:block}
.section-box{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:24px 28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-title{font-size:12px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.8px;padding-bottom:10px;margin-bottom:14px;border-bottom:2px solid #1B2A4A}
.prose{font-size:13px;line-height:1.8}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.insight-green{background:#F0FFF4;border-radius:10px;padding:18px 20px;border-left:4px solid #276749}
.insight-blue{background:#EBF8FF;border-radius:10px;padding:18px 20px;border-left:4px solid #2B6CB0}
.insight-navy{background:#EBF4FF;border-radius:10px;padding:18px 20px;border-left:4px solid #1B2A4A;margin-bottom:28px}
.insight-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#718096;margin-bottom:8px}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:12px}
.score-card{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.score-name{font-weight:700;font-size:15px;color:#0f172a}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:6px}
.badge.green{background:#C6F6D5;color:#276749}
.badge.yellow{background:#FEF3C7;color:#92400E}
.badge.red{background:#FED7D7;color:#9B2335}
.score-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.score-kpi-label{font-size:10px;color:#94a3b8;margin:0 0 3px}
.score-kpi-val{font-size:17px;font-weight:700;color:#1e293b;margin:0}
.progress-wrap{margin-top:16px}
.progress-labels{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-bottom:3px}
.progress-bar{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:99px}
.progress-fill.green{background:#10b981}
.progress-fill.yellow{background:#f59e0b}
.progress-fill.red{background:#ef4444}
.progress-mid{position:absolute;top:0;bottom:0;left:50%;width:1px;background:#64748b;opacity:.4}
.footnote{font-size:11px;color:#94a3b8;font-style:italic;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:#1B2A4A;color:white}
th{padding:10px 14px;text-align:center;font-weight:600;font-size:11px;white-space:nowrap}
th.left{text-align:left}
td{padding:8px 14px;text-align:center;border-bottom:1px solid #E2E8F0;white-space:nowrap}
td.left{text-align:left;font-weight:600;color:#1B2A4A}
td.above{background:#C6F6D5;color:#276749;font-weight:600}
td.below{background:#FED7D7;color:#9B2335;font-weight:600}
td.neutral{background:#EDF2F7;color:#4A5568;font-weight:600}
td.dash{color:#CBD5E0}
tr.avg-row td{background:#EBF4FF;font-weight:700;color:#1B2A4A}
.table-wrap{overflow-x:auto}
.legend{padding:10px 0;display:flex;gap:14px;font-size:11px}
.legend-item{display:inline-flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.chart-section{margin-bottom:20px}
.chart-title{font-size:13px;font-weight:700;color:#1B2A4A;margin-bottom:12px}
.bar-chart{background:#F7F8FA;border:1px solid #E2E8F0;border-radius:8px;padding:16px;overflow-x:auto}
.bar-wrap{display:flex;align-items:flex-end;gap:6px;min-height:160px;padding-bottom:24px;position:relative;border-bottom:1px solid #CBD5E0}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:30px;max-width:80px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.bar-val{font-size:9px;font-weight:700;color:#2D3748;margin-bottom:3px;text-align:center}
.bar-name{font-size:8px;color:#718096;text-align:center;word-break:break-word;margin-top:4px;max-width:60px}
.ref-line{position:absolute;left:0;right:0;border-top:2px dashed #1B2A4A;z-index:10}
.ref-label{position:absolute;right:4px;font-size:9px;color:#1B2A4A;font-weight:600;white-space:nowrap;transform:translateY(-100%)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
footer{margin-top:48px;text-align:center;font-size:11px;color:#94a3b8;padding:20px 0;border-top:1px solid #E2E8F0}
@media(max-width:768px){.cards{grid-template-columns:1fr 1fr}.kpi-cards{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.charts-grid{grid-template-columns:1fr}}
@media print{body{background:white}nav{position:static}}

</style>
</head>
<body>
<nav><div class="nav-inner"><div class="nav-left"><div class="logo">O</div><span class="nav-brand">OncoSmart</span><span class="nav-sub">Clinic Health Report</span></div><div class="nav-right"><span class="nav-client">NWMS</span><span class="nav-badge">February 2026</span></div></div></nav>
<div class="container"><h1>NWMS</h1><p class="page-sub">February 2026 · Monthly Performance Summary</p><div id="app"></div></div>
<script>
var DATA = {"client_code": "NWMS", "month_label": "February 2026", "loc_count": 5, "co": {"sc": 89.3, "del": 6.7, "cu": 64.1}, "locs": [{"name": "Federal Way", "score": 75, "sc": {"v": 95.5, "p": 93.3}, "del": {"v": 3.4, "p": 1.7}, "dm": 2.8, "cu": {"v": 51.9, "p": 45.6}, "cm": 52.2, "tx": {"v": 0.5, "p": 1.1}, "mpc": 16.3, "ia": {"v": 100.0, "p": 83.3}, "ppn": 7.3, "cpn": 4.0, "nu": {"v": 66.7, "p": 58.0}}, {"name": "Gig Harbour", "score": 79, "sc": {"v": 90.8, "p": 80.9}, "del": {"v": 5.5, "p": 4.9}, "dm": 3.3, "cu": {"v": 64.1, "p": null}, "cm": 64.7, "tx": {"v": 0.3, "p": 0.4}, "mpc": 15.4, "ia": {"v": 100.0, "p": null}, "ppn": 6.8, "cpn": 2.4, "nu": {"v": 61.0, "p": 58.4}}, {"name": "Olympia", "score": 68, "sc": {"v": 89.1, "p": 91.6}, "del": {"v": 8.4, "p": 5.9}, "dm": 6.5, "cu": {"v": 80.0, "p": 77.9}, "cm": 81.3, "tx": {"v": 3.2, "p": 1.3}, "mpc": 37.8, "ia": {"v": 81.2, "p": 82.3}, "ppn": 7.6, "cpn": 2.8, "nu": {"v": 75.1, "p": 69.9}}, {"name": "Puyallup", "score": 69, "sc": {"v": 86.2, "p": 75.8}, "del": {"v": 7.6, "p": 5.5}, "dm": 7.0, "cu": {"v": 65.4, "p": 66.9}, "cm": 65.7, "tx": {"v": 1.2, "p": 1.8}, "mpc": 55.2, "ia": {"v": 42.1, "p": 95.2}, "ppn": 7.9, "cpn": 2.5, "nu": {"v": 77.4, "p": 73.9}}, {"name": "Tacoma", "score": 71, "sc": {"v": 93.8, "p": 86.4}, "del": {"v": 8.5, "p": 7.5}, "dm": 6.5, "cu": {"v": 54.8, "p": 65.8}, "cm": 56.0, "tx": {"v": 0.3, "p": 0.8}, "mpc": 14.5, "ia": {"v": 100.0, "p": null}, "ppn": 5.9, "cpn": 2.4, "nu": {"v": 54.7, "p": 53.8}}], "ins": {"es": "NWMS delivered a composite performance score of 72.8 out of 100 (where 50 represents the network average) in February 2026, reflecting solid operational discipline across the region. Our five clinics maintained scheduler compliance averaging 91.1% against the company benchmark of 89.32%, and we made measurable progress on closure adherence, with four of five sites reducing treatments running past closing time month-over-month. However, average patient delay across the region sits at 7.1 minutes, slightly elevated versus the company average of 6.68 minutes, driven primarily by scheduling variability at two key sites.", "hi": "Federal Way demonstrated the most encouraging trajectory, with minutes past close per patient improving 61.3% from 42.2 minutes in January to 16.3 minutes in February, while nurse utilization rose 15.0 percentage points from 58.0% to 66.7% over the same period. Gig Harbour continues to lead our region in iAssign adoption at 100% utilization with a performance score of 79 out of 100, and has maintained closure discipline with only 0.3 treatments past closing daily in February, down from 0.4 in January.", "ae": "We noticed Puyallup's iAssign utilization at 42.1% remains significantly below the company average of 86.4%, and a three-month trend shows consistent decline from a three-month rolling average of 79.1%; exploring barriers to adoption here alongside their elevated 1.2 treatments past closing per day could unlock efficiency gains. Olympia's chair utilization of 80.0% is performing well above the company average of 64.13%, but the clinic is managing 3.2 treatments past closing daily\u2014notably 1.9 standard deviations above our regional mean of 1.1\u2014suggesting that high utilization may be creating scheduling pressure worth examining together.", "rc": "Tacoma presents our biggest performance gap: average patient delay of 8.5 minutes represents a 27% gap versus the company average of 6.68 minutes, despite strong scheduler compliance of 93.8%. We recommend conducting a detailed audit of Tacoma's scheduling templates and appointment interval standards to identify whether gaps in iOptimize adoption or patient flow sequencing are inflating wait times, with the goal of bringing delay performance in line with Federal Way's benchmark of 3.4 minutes."}};
var NAVY="#1B2A4A",TEAL="#2C7A7B",GREEN="#276749";
var EM="\u2014", MID="\u00b7", UP="\u2191", DN="\u2193", RT="\u2192", AP="\u2019";

function nd(){return EM;}

function delta(v,p,hb){
  if(v==null||p==null)return "";
  var d=v-p;
  if(Math.abs(d)<0.05)return '<span style="color:#A0AEC0;font-size:10px"> '+RT+'</span>';
  var good=hb?d>0:d<0, arrow=d>0?UP:DN, color=good?"#276749":"#9B2335";
  return '<span style="color:'+color+';font-size:10px;font-weight:600;margin-left:4px">'+arrow+Math.abs(d).toFixed(1)+'</span>'
       +'<span style="color:#A0AEC0;font-size:9px;margin-left:3px">(was '+p.toFixed(1)+')</span>';
}

function cellCls(v,b,hb){
  if(v==null)return "dash";
  if(b==null)return "";
  var diff=v-b, th=Math.abs(b)*0.05;
  if(Math.abs(diff)<=th)return "neutral";
  return (diff>0)===hb?"above":"below";
}

function badge(s){
  var c=s>=60?"green":s<40?"red":"yellow";
  return '<span class="badge '+c+'">'+s+'</span>';
}

function scoreColor(s){return s>=60?"green":s<40?"red":"yellow";}

function avgL(f,sub){
  var vals=DATA.locs.map(function(l){return sub?l[f][sub]:l[f];}).filter(function(v){return v!=null;});
  return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;
}

var avgScore=DATA.locs.length?Math.round(DATA.locs.reduce(function(s,l){return s+(l.score||50);},0)/DATA.locs.length):50;
var avgDel=avgL("del","v"), avgDelP=avgL("del","p");
var avgTx =avgL("tx","v"),  avgTxP =avgL("tx","p");
var avgSc =avgL("sc","v"),  avgScP =avgL("sc","p");
var avgCu =avgL("cu","v"),  avgCuP =avgL("cu","p");

function pct(c,p){
  if(c==null||p==null||p===0)return null;
  return ((c-p)/Math.abs(p)*100).toFixed(1);
}

function kpiChange(curr,prev,good){
  var p=pct(curr,prev);
  if(p==null)return '<p class="kpi-change none">No prior month data</p>';
  var sign=Number(p)>0?"+":"", cls=good?"good":"bad";
  return '<p class="kpi-change '+cls+'">'+sign+p+'% vs prior month</p>';
}

function barChart(title,items,refVal,refLabel,lo,su){
  su=su||"%";
  if(!items||items.length===0)return '<div class="chart-section"><div class="chart-title">'+title+'</div><p style="color:#94a3b8;font-size:12px">No data</p></div>';
  var disp=items;
  if(items.length>20){
    var sorted=items.slice().sort(function(a,b){return lo?a.v-b.v:b.v-a.v;});
    var seen={},out=[];
    sorted.slice(0,10).concat(sorted.slice(-10)).forEach(function(x){if(!seen[x.name]){seen[x.name]=1;out.push(x);}});
    disp=out;
  }
  var maxV=Math.max.apply(null,disp.map(function(d){return d.v||0;}).concat([refVal||0]))*1.2||10;
  function bc(v){
    if(refVal==null)return TEAL;
    if(lo)return v<=refVal?TEAL:v>refVal*1.15?"#E53E3E":"#DD6B20";
    return v>=refVal?TEAL:v<refVal*0.85?"#E53E3E":"#DD6B20";
  }
  var refPct=refVal?(refVal/maxV*100):null;
  var bars=disp.map(function(item){
    var h=item.v?(item.v/maxV*100):0;
    return '<div class="bar-col">'
      +'<div class="bar-val">'+item.v.toFixed(1)+su+'</div>'
      +'<div class="bar" style="height:'+h+'%;background:'+bc(item.v)+';width:100%"></div>'
      +'<div class="bar-name">'+item.name+'</div>'
      +'</div>';
  }).join("");
  var refHtml=refPct
    ?'<div class="ref-line" style="bottom:'+refPct+'%"><span class="ref-label">'+refLabel+" ("+refVal.toFixed(1)+su+")</span></div>"
    :"";
  var note=items.length>20
    ?'<p style="font-size:11px;color:#718096;margin-top:8px;font-style:italic">Showing top 10 and bottom 10 of '+items.length+' locations</p>'
    :"";
  return '<div class="chart-section">'
    +'<div class="chart-title">'+title+'</div>'
    +'<div class="bar-chart"><div class="bar-wrap">'+refHtml+bars+'</div></div>'
    +note+'</div>';
}

function render(){
  var co=DATA.co, locs=DATA.locs, ins=DATA.ins, h="";

  // Summary cards
  h+='<div class="cards">';
  h+='<div class="card"><p class="card-label">Locations</p><p class="card-val">'+DATA.loc_count+'</p><p class="card-sub">Active clinics</p></div>';
  h+='<div class="card"><p class="card-label">Avg Performance Score</p><p class="card-val'+(avgScore>=50?' good':'')+'">'+avgScore+'</p><p class="card-sub">Network avg: 50</p></div>';
  h+='<div class="card"><p class="card-label">Company Avg Compliance</p><p class="card-val">'+(co.sc?co.sc.toFixed(1)+"%":EM)+'</p><p class="card-sub">Scheduler compliance</p></div>';
  h+='<div class="card"><p class="card-label">Company Avg Delay</p><p class="card-val">'+(co.del?co.del.toFixed(1)+" min":EM)+'</p><p class="card-sub">Patient wait time</p></div>';
  h+='</div>';

  // KPI change cards
  h+='<p style="text-align:center;font-size:14px;font-weight:700;color:'+TEAL+';text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px">Change Since Prior Month (Company Average)</p>';
  h+='<div class="kpi-cards">';
  var kpis=[
    {title:"Treatment Delay",   val:avgDel, suf:" min", color:"#38BDF8", good:avgDel!=null&&avgDelP!=null&&avgDel<avgDelP, prev:avgDelP},
    {title:"Extended Hours",    val:avgTx,  suf:"/day", color:"#FB923C", good:avgTx!=null &&avgTxP!=null &&avgTx<avgTxP,  prev:avgTxP},
    {title:"Scheduler Compliance",val:avgSc,suf:"%",    color:"#2DD4BF", good:avgSc!=null &&avgScP!=null &&avgSc>avgScP,  prev:avgScP},
    {title:"Chair Utilization", val:avgCu,  suf:"%",    color:"#C084FC", good:avgCu!=null &&avgCuP!=null &&avgCu>avgCuP,  prev:avgCuP}
  ];
  kpis.forEach(function(k){
    h+='<div class="kpi-card"><div class="kpi-bar" style="background:'+k.color+'"></div><div class="kpi-inner">';
    h+='<p class="kpi-title">'+k.title+'</p>';
    h+='<p class="kpi-value" style="color:'+k.color+'">'+(k.val!=null?k.val.toFixed(k.suf==="/day"?2:1)+k.suf:EM)+'</p>';
    h+=kpiChange(k.val,k.prev,k.good);
    h+='</div></div>';
  });
  h+='</div>';

  // Tabs
  h+='<div class="tabs">';
  [["overview","Performance Overview"],["ioptimize","iOptimize Metrics"],["iassign","iAssign Metrics"],["charts","Charts"]].forEach(function(t,i){
    h+='<button class="tab'+(i===0?' active':'')+'" onclick="switchTab(\''+t[0]+'\')" id="tab-'+t[0]+'">'+t[1]+'</button>';
  });
  h+='</div>';

  // Overview tab
  h+='<div class="tab-content active" id="content-overview">';
  if(ins.es)h+='<div class="section-box"><div class="section-title">Performance Overview</div><p class="prose">'+ins.es+'</p></div>';
  if(ins.hi||ins.ae){
    h+='<div class="two-col">';
    if(ins.hi)h+='<div class="insight-green"><div class="insight-label">What'+AP+'s Working Well</div><p class="prose">'+ins.hi+'</p></div>';
    if(ins.ae)h+='<div class="insight-blue"><div class="insight-label">Areas to Explore</div><p class="prose">'+ins.ae+'</p></div>';
    h+='</div>';
  }
  if(ins.rc)h+='<div class="insight-navy"><div class="insight-label">How We Can Help</div><p class="prose">'+ins.rc+'</p></div>';
  h+='<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8;margin-bottom:12px">Clinic Performance Scores</p>';
  h+='<div class="score-grid">';
  locs.forEach(function(l){
    var s=l.score||50;
    h+='<div class="score-card">';
    h+='<div class="score-header"><span class="score-name">'+l.name+'</span>'+badge(s)+'</div>';
    h+='<div class="score-kpis">';
    [{lb:"Compliance",f:"sc",su:"%",hb:true},{lb:"Avg Delay",f:"del",su:" min",hb:false},{lb:"Chair Util",f:"cu",su:"%",hb:true}].forEach(function(k){
      var v=l[k.f].v, p=l[k.f].p;
      h+='<div><p class="score-kpi-label">'+k.lb+'</p><p class="score-kpi-val">'+(v!=null?v.toFixed(1)+k.su:EM)+'</p>'+(v!=null?'<div>'+delta(v,p,k.hb)+'</div>':'')+'</div>';
    });
    h+='</div>';
    h+='<div class="progress-wrap"><div class="progress-labels"><span>0</span><span>Network Avg (50)</span><span>100</span></div>';
    h+='<div class="progress-bar"><div class="progress-fill '+scoreColor(s)+'" style="width:'+Math.min(s,100)+'%"></div><div class="progress-mid"></div></div></div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<p class="footnote">Performance Score: weighted blend of compliance (25%), delay (20%), chair utilization (20%), iAssign adoption (15%), overtime (10%), and nurse utilization (10%). 50 = network average, 100 = top decile.</p>';
  h+='</div>';

  // iOptimize tab
  h+='<div class="tab-content" id="content-ioptimize"><div class="section-box">';
  h+='<div class="section-title">iOptimize '+EM+' Scheduling &amp; Flow Metrics</div>';
  h+='<p style="font-size:11px;color:#718096;margin-bottom:12px">Colour coding vs company average '+MID+' Arrows show MoM change with prior value</p>';
  h+='<div class="table-wrap"><table><thead><tr>';
  h+='<th class="left">Location</th><th>Scheduler Compliance</th><th>Avg Delay (min)</th><th>Median Delay</th><th>Chair Utilization</th><th>Chair Util. Median</th><th>Tx Past Close</th><th>Mins Past Close / Pt</th>';
  h+='</tr></thead><tbody>';
  locs.forEach(function(l){
    h+='<tr><td class="left">'+l.name+badge(l.score||50)+'</td>';
    h+='<td class="'+cellCls(l.sc.v,co.sc,true)+'">'+(l.sc.v!=null?l.sc.v.toFixed(1)+"%":EM)+delta(l.sc.v,l.sc.p,true)+'</td>';
    h+='<td class="'+cellCls(l.del.v,co.del,false)+'">'+(l.del.v!=null?l.del.v.toFixed(1)+" min":EM)+delta(l.del.v,l.del.p,false)+'</td>';
    h+='<td>'+(l.dm!=null?l.dm+" min":EM)+'</td>';
    h+='<td class="'+cellCls(l.cu.v,co.cu,true)+'">'+(l.cu.v!=null?l.cu.v.toFixed(1)+"%":EM)+delta(l.cu.v,l.cu.p,true)+'</td>';
    h+='<td>'+(l.cm!=null?l.cm+"%":EM)+'</td>';
    h+='<td class="'+cellCls(l.tx.v,0.5,false)+'">'+(l.tx.v!=null?l.tx.v.toFixed(1)+"/day":EM)+delta(l.tx.v,l.tx.p,false)+'</td>';
    h+='<td>'+l.mpc+' min</td></tr>';
  });
  if(co.sc){
    h+='<tr class="avg-row"><td class="left">Company Average</td>';
    h+='<td>'+co.sc.toFixed(1)+'%</td>';
    h+='<td>'+(co.del?co.del.toFixed(1)+' min':EM)+'</td><td></td>';
    h+='<td>'+(co.cu?co.cu.toFixed(1)+'%':EM)+'</td><td></td><td></td><td></td></tr>';
  }
  h+='</tbody></table></div>';
  h+='<div class="legend">';
  h+='<span class="legend-item"><span class="legend-dot" style="background:#C6F6D5;border:1px solid #9ae6b4"></span>Above avg</span>';
  h+='<span class="legend-item"><span class="legend-dot" style="background:#FED7D7;border:1px solid #feb2b2"></span>Below avg</span>';
  h+='<span class="legend-item"><span class="legend-dot" style="background:#EDF2F7;border:1px solid #CBD5E0"></span>Within 5%</span>';
  h+='</div></div></div>';

  // iAssign tab
  h+='<div class="tab-content" id="content-iassign"><div class="section-box">';
  h+='<div class="section-title">iAssign '+EM+' Staffing &amp; Nurse Metrics</div>';
  h+='<div class="table-wrap"><table><thead><tr>';
  h+='<th class="left">Location</th><th>iAssign Utilization</th><th>Patients / Nurse</th><th>Chairs / Nurse</th><th>Nurse Utilization</th>';
  h+='</tr></thead><tbody>';
  locs.forEach(function(l){
    h+='<tr><td class="left">'+l.name+'</td>';
    h+='<td style="background:#C6F6D5;color:#276749;font-weight:600">'+(l.ia.v!=null?l.ia.v.toFixed(1)+"%":EM)+'</td>';
    h+='<td>'+(l.ppn!=null?l.ppn:EM)+'</td>';
    h+='<td>'+(l.cpn!=null?l.cpn:EM)+'</td>';
    h+='<td class="'+cellCls(l.nu.v,67,true)+'">'+(l.nu.v!=null?l.nu.v.toFixed(1)+"%":EM)+delta(l.nu.v,l.nu.p,true)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div></div>';

  // Charts tab
  h+='<div class="tab-content" id="content-charts"><div class="charts-grid">';
  h+=barChart("Scheduler Compliance by Location",locs.filter(function(l){return l.sc.v!=null;}).map(function(l){return{name:l.name,v:l.sc.v};}),co.sc,"Company Avg",false,"%");
  h+=barChart("Avg Delay Before Treatment",locs.filter(function(l){return l.del.v!=null;}).map(function(l){return{name:l.name,v:l.del.v};}),co.del,"Company Avg",true," min");
  h+=barChart("Chair Utilization by Location",locs.filter(function(l){return l.cu.v!=null;}).map(function(l){return{name:l.name,v:l.cu.v};}),co.cu,"Company Avg",false,"%");
  h+=barChart("iAssign Utilization by Location",locs.filter(function(l){return l.ia&&l.ia.v!=null;}).map(function(l){return{name:l.name,v:l.ia.v};}),null,"",false,"%");
  h+='</div></div>';

  // Footer
  h+='<footer>NWMS '+MID+' February 2026 Clinic Health Report '+MID+' Prepared by the OncoSmart Analytics Team<br>Confidential '+EM+' for internal review only</footer>';

  document.getElementById("app").innerHTML=h;
}

function switchTab(id){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.querySelectorAll(".tab-content").forEach(function(t){t.classList.remove("active");});
  document.getElementById("tab-"+id).classList.add("active");
  document.getElementById("content-"+id).classList.add("active");
}

render();

</script>
</body>
</html>
