var NAVY="#1B2A4A",TEAL="#2C7A7B",GREEN="#276749";

function fmt(v, dec, su) {
  if(v == null) return "—";
  return v.toFixed(dec||1) + (su||"");
}

function delta(v, p, higher_better) {
  if(v==null||p==null) return "";
  var d = v - p;
  if(Math.abs(d) < 0.05) return '<span style="color:#A0AEC0;font-size:10px"> →</span>';
  var good = higher_better ? d > 0 : d < 0;
  var arrow = d > 0 ? "↑" : "↓";
  var color = good ? "#276749" : "#9B2335";
  return '<span style="color:'+color+';font-size:10px;font-weight:600;margin-left:4px">'+arrow+Math.abs(d).toFixed(1)+'</span><span style="color:#A0AEC0;font-size:9px;margin-left:3px">(was '+p.toFixed(1)+')</span>';
}

function cellClass(v, b, higher_better) {
  if(v==null) return "dash";
  if(b==null) return "";
  var diff = v - b, thresh = Math.abs(b)*0.05;
  if(Math.abs(diff) <= thresh) return "neutral";
  if((diff>0) === higher_better) return "above";
  return "below";
}

function badge(s) {
  var cls = s>=60?"green":s<40?"red":"yellow";
  return '<span class="badge '+cls+'">'+s+'</span>';
}

function scoreColor(s) {
  return s>=60?"green":s<40?"red":"yellow";
}

// Summary cards
function avgLocs(field, sub) {
  var vals = DATA.locs.map(function(l){ return sub ? l[field][sub] : l[field]; }).filter(function(v){ return v!=null; });
  return vals.length ? vals.reduce(function(a,b){return a+b},0)/vals.length : null;
}
var avgScore = DATA.locs.length ? Math.round(DATA.locs.reduce(function(s,l){return s+(l.score||50)},0)/DATA.locs.length) : 50;
var avgDel=avgLocs("del","v"), avgDelP=avgLocs("del","p");
var avgTx=avgLocs("tx","v"),  avgTxP=avgLocs("tx","p");
var avgSc=avgLocs("sc","v"),  avgScP=avgLocs("sc","p");
var avgCu=avgLocs("cu","v"),  avgCuP=avgLocs("cu","p");

function pctChange(c,p) {
  if(c==null||p==null||p===0) return null;
  return ((c-p)/Math.abs(p)*100).toFixed(1);
}

function kpiChangeHtml(curr, prev, good) {
  var pct = pctChange(curr, prev);
  if(pct==null) return '<p class="kpi-change none">No prior month data</p>';
  var sign = Number(pct)>0?"+":"";
  var cls = good ? "good" : "bad";
  return '<p class="kpi-change '+cls+'">'+sign+pct+'% vs prior month</p>';
}

// Bar chart
function barChart(title, items, refVal, refLabel, lowerBetter, suffix) {
  suffix = suffix || "%";
  if(!items || items.length === 0) return '<div class="chart-section"><div class="chart-title">'+title+'</div><p style="color:#94a3b8;font-size:12px">No data</p></div>';
  var display = items;
  if(items.length > 20) {
    var sorted = items.slice().sort(function(a,b){ return lowerBetter ? a.v-b.v : b.v-a.v; });
    var top10 = sorted.slice(0,10);
    var bot10 = sorted.slice(-10);
    var seen = {};
    display = [];
    top10.concat(bot10).forEach(function(x){ if(!seen[x.name]){ seen[x.name]=1; display.push(x); } });
  }
  var maxV = Math.max.apply(null, display.map(function(d){return d.v||0}).concat([refVal||0])) * 1.2 || 10;
  var barColor = function(v) {
    if(refVal==null) return TEAL;
    if(lowerBetter) return v<=refVal ? TEAL : v>refVal*1.15 ? "#E53E3E" : "#DD6B20";
    return v>=refVal ? TEAL : v<refVal*0.85 ? "#E53E3E" : "#DD6B20";
  };
  var refPct = refVal ? (refVal/maxV*100) : null;
  var barsHtml = display.map(function(item) {
    var h = item.v ? (item.v/maxV*100) : 0;
    return '<div class="bar-col">'+
      '<div class="bar-val">'+item.v.toFixed(1)+suffix+'</div>'+
      '<div class="bar" style="height:'+h+'%;background:'+barColor(item.v)+';width:100%"></div>'+
      '<div class="bar-name">'+item.name+'</div>'+
    '</div>';
  }).join('');
  var refHtml = refPct ? '<div class="ref-line" style="bottom:'+refPct+'%"><span class="ref-label">'+refLabel+' ('+refVal.toFixed(1)+suffix+')</span></div>' : '';
  var note = items.length>20 ? '<p style="font-size:11px;color:#718096;margin-top:8px;font-style:italic">Showing top 10 and bottom 10 of '+items.length+' locations</p>' : '';
  return '<div class="chart-section">'+
    '<div class="chart-title">'+title+'</div>'+
    '<div class="bar-chart">'+
      '<div class="bar-wrap" style="position:relative">'+refHtml+barsHtml+'</div>'+
    '</div>'+note+
  '</div>';
}

function render() {

  });

  html += '<div class="tabs">';

  // Overview tab
  html += '<div class="tab-content active" id="content-overview">';
  if(ins.es) html += '<div class="section-box"><div class="section-title">Performance Overview</div><p class="prose">'+ins.es+'</p></div>';
  if(ins.hi||ins.ae) {
    html += '<div class="two-col">';
    if(ins.hi) html += '<div class="insight-green"><div class="insight-label">What's Working Well</div><p class="prose">'+ins.hi+'</p></div>';
    if(ins.ae) html += '<div class="insight-blue"><div class="insight-label">Areas to Explore</div><p class="prose">'+ins.ae+'</p></div>';
    html += '</div>';
  }
  if(ins.rc) html += '<div class="insight-navy"><div class="insight-label">How We Can Help</div><p class="prose">'+ins.rc+'</p></div>';
  html += '<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8;margin-bottom:12px">Clinic Performance Scores</p>';
  html += '<div class="score-grid">';
  locs.forEach(function(l) {
    var sc = l.score||50;
    html += '<div class="score-card">';
    html += '<div class="score-header"><span class="score-name">'+l.name+'</span>'+badge(sc)+'</div>';
    html += '<div class="score-kpis">';
    [{'lb':'Compliance','f':'sc','su':'%','h':true},{'lb':'Avg Delay','f':'del','su':' min','h':false},{'lb':'Chair Util','f':'cu','su':'%','h':true}].forEach(function(k) {
      var v = l[k.f].v, p = l[k.f].p;
      var dlt = delta(v, p, k.h);
      html += '<div>';
      html += '<p class="score-kpi-label">'+k.lb+'</p>';
      html += '<p class="score-kpi-val">'+(v!=null?v.toFixed(1)+k.su:"—")+'</p>';
      if(dlt) html += '<div>'+dlt+'</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="progress-wrap"><div class="progress-labels"><span>0</span><span>Network Avg (50)</span><span>100</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill '+scoreColor(sc)+'" style="width:'+Math.min(sc,100)+'%"></div><div class="progress-mid"></div></div></div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<p class="footnote">Performance Score: weighted blend of compliance (25%), delay (20%), chair utilization (20%), iAssign adoption (15%), overtime (10%), and nurse utilization (10%). 50 = network average, 100 = top decile.</p>';
  html += '</div>';

  // iOptimize tab
  html += '<div class="tab-content" id="content-ioptimize">';
  html += '<div class="section-box">';
  html += '<div class="section-title">iOptimize &mdash; Scheduling &amp; Flow Metrics</div>';
  html += '<p style="font-size:11px;color:#718096;margin-bottom:12px">Colour coding vs company average &middot; Arrows show MoM change with prior value</p>';
  html += '<div class="table-wrap"><table>';

  locs.forEach(function(l) {
    html += '<tr>';
    html += '<td class="left">'+l.name+badge(l.score||50)+'</td>';
    html += '<td class="'+cellClass(l.sc.v,co.sc,true)+'">'+(l.sc.v!=null?l.sc.v.toFixed(1)+"%":"—")+delta(l.sc.v,l.sc.p,true)+'</td>';
    html += '<td class="'+cellClass(l.del.v,co.del,false)+'">'+(l.del.v!=null?l.del.v.toFixed(1)+" min":"—")+delta(l.del.v,l.del.p,false)+'</td>';

    html += '<td>'+(l.cm!=null?l.cm+"%":"—")+'</td>';
    html += '<td class="'+cellClass(l.tx.v,0.5,false)+'">'+(l.tx.v!=null?l.tx.v.toFixed(1)+"/day":"—")+delta(l.tx.v,l.tx.p,false)+'</td>';

    html += '</tr>';
  });
  if(co.sc) {

  }
  html += '</tbody></table></div>';
  html += '<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#C6F6D5;border:1px solid #9ae6b4"></span>Above avg</span><span class="legend-item"><span class="legend-dot" style="background:#FED7D7;border:1px solid #feb2b2"></span>Below avg</span><span class="legend-item"><span class="legend-dot" style="background:#EDF2F7;border:1px solid #CBD5E0"></span>Within 5%</span></div>';
  html += '</div></div>';

  // iAssign tab
  html += '<div class="tab-content" id="content-iassign">';
  html += '<div class="section-box">';

  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th class="left">Location</th><th>iAssign Utilization</th><th>Patients / Nurse</th><th>Chairs / Nurse</th><th>Nurse Utilization</th></tr></thead><tbody>';
  locs.forEach(function(l) {
    html += '<tr>';
    html += '<td class="left">'+l.name+'</td>';
    html += '<td style="background:#C6F6D5;color:#276749;font-weight:600">'+(l.ia.v!=null?l.ia.v.toFixed(1)+"%":"—")+'</td>';

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });

  document.getElementById('tab-'+id).classList.add('active');

}
