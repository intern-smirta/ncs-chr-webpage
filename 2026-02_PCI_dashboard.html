<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCI — Clinic Health Report | February 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.6;color:#2D3748;background:linear-gradient(135deg,#f0f4f8,#e8ecf1);min-height:100vh}
nav{background:#1B2A4A;color:white;padding:12px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2dd4bf,#14b8a6);display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:14px}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-brand{font-weight:700;font-size:16px}
.nav-sub{color:#94a3b8;font-size:13px;margin-left:4px}
.nav-right{display:flex;align-items:center;gap:14px;font-size:13px}
.nav-client{color:#94a3b8}
.nav-badge{background:#2C7A7B;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;color:white}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
h1{font-size:28px;font-weight:800;color:#0f172a;letter-spacing:-.5px;margin:0}
.page-sub{color:#4A5568;margin-top:4px;font-size:13px;margin-bottom:28px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.card{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8;margin:0}
.card-val{font-size:30px;font-weight:800;letter-spacing:-1px;margin:4px 0 2px;color:#0f172a}
.card-val.good{color:#276749}
.card-sub{font-size:11px;color:#94a3b8;margin:0}
.kpi-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.kpi-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #E2E8F0}
.kpi-bar{height:6px}
.kpi-inner{padding:20px 24px;text-align:center}
.kpi-title{font-size:14px;font-weight:600;color:#475569;margin:0 0 12px}
.kpi-value{font-size:32px;font-weight:800;letter-spacing:-1px;margin:0 0 6px}
.kpi-change{font-size:12px;font-weight:600;margin:0}
.kpi-change.good{color:#16a34a}
.kpi-change.bad{color:#dc2626}
.kpi-change.none{color:#A0AEC0}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:white;border-radius:12px;padding:4px;border:1px solid #E2E8F0;width:fit-content}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:#4A5568;transition:all .2s}
.tab.active{background:#1B2A4A;color:white}
.tab-content{display:none}
.tab-content.active{display:block}
.section-box{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:24px 28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-title{font-size:12px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.8px;padding-bottom:10px;margin-bottom:14px;border-bottom:2px solid #1B2A4A}
.prose{font-size:13px;line-height:1.8}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.insight-green{background:#F0FFF4;border-radius:10px;padding:18px 20px;border-left:4px solid #276749}
.insight-blue{background:#EBF8FF;border-radius:10px;padding:18px 20px;border-left:4px solid #2B6CB0}
.insight-navy{background:#EBF4FF;border-radius:10px;padding:18px 20px;border-left:4px solid #1B2A4A;margin-bottom:28px}
.insight-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#718096;margin-bottom:8px}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:12px}
.score-card{background:white;border-radius:12px;border:1px solid #E2E8F0;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.score-name{font-weight:700;font-size:15px;color:#0f172a}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:6px}
.badge.green{background:#C6F6D5;color:#276749}
.badge.yellow{background:#FEF3C7;color:#92400E}
.badge.red{background:#FED7D7;color:#9B2335}
.score-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.score-kpi-label{font-size:10px;color:#94a3b8;margin:0 0 3px}
.score-kpi-val{font-size:17px;font-weight:700;color:#1e293b;margin:0}
.score-kpi-delta{font-size:10px;font-weight:600;margin-top:2px}
.score-kpi-delta.up{color:#276749}
.score-kpi-delta.down{color:#9B2335}
.score-kpi-delta.flat{color:#A0AEC0}
.progress-wrap{margin-top:16px}
.progress-labels{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-bottom:3px}
.progress-bar{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:99px}
.progress-fill.green{background:#10b981}
.progress-fill.yellow{background:#f59e0b}
.progress-fill.red{background:#ef4444}
.progress-mid{position:absolute;top:0;bottom:0;left:50%;width:1px;background:#64748b;opacity:.4}
.footnote{font-size:11px;color:#94a3b8;font-style:italic;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:#1B2A4A;color:white}
th{padding:10px 14px;text-align:center;font-weight:600;font-size:11px;white-space:nowrap}
th.left{text-align:left}
td{padding:8px 14px;text-align:center;border-bottom:1px solid #E2E8F0;white-space:nowrap}
td.left{text-align:left;font-weight:600;color:#1B2A4A}
td.above{background:#C6F6D5;color:#276749;font-weight:600}
td.below{background:#FED7D7;color:#9B2335;font-weight:600}
td.neutral{background:#EDF2F7;color:#4A5568;font-weight:600}
td.dash{color:#CBD5E0}
tr.avg-row td{background:#EBF4FF;font-weight:700;color:#1B2A4A}
.table-wrap{overflow-x:auto}
.legend{padding:10px 0;display:flex;gap:14px;font-size:11px}
.legend-item{display:inline-flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.chart-section{margin-bottom:20px}
.chart-title{font-size:13px;font-weight:700;color:#1B2A4A;margin-bottom:12px}
.bar-chart{background:#F7F8FA;border:1px solid #E2E8F0;border-radius:8px;padding:16px;overflow-x:auto}
.bar-wrap{display:flex;align-items:flex-end;gap:6px;min-height:160px;padding-bottom:24px;position:relative;border-bottom:1px solid #CBD5E0}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:30px;max-width:80px}
.bar{width:100%;border-radius:3px 3px 0 0;position:relative;min-height:4px;transition:opacity .2s}
.bar:hover{opacity:.8}
.bar-val{font-size:9px;font-weight:700;color:#2D3748;margin-bottom:3px;text-align:center}
.bar-name{font-size:8px;color:#718096;text-align:center;word-break:break-word;margin-top:4px;max-width:60px}
.ref-line{position:absolute;left:0;right:0;border-top:2px dashed #1B2A4A;z-index:10}
.ref-label{position:absolute;right:4px;font-size:9px;color:#1B2A4A;font-weight:600;white-space:nowrap;transform:translateY(-100%)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
footer{margin-top:48px;text-align:center;font-size:11px;color:#94a3b8;padding:20px 0;border-top:1px solid #E2E8F0}
@media(max-width:768px){.cards{grid-template-columns:1fr 1fr}.kpi-cards{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.charts-grid{grid-template-columns:1fr}}
@media print{body{background:white}nav{position:static}}
</style>
</head>

<script>
var DATA = {"client_code": "PCI", "month_label": "February 2026", "loc_count": 7, "co": {"sc": 77.8, "del": 13.2, "cu": 83.6}, "locs": [{"name": "Fayatteville - SI", "score": 67, "sc": {"v": 78.1, "p": 54.5}, "del": {"v": 10.4, "p": 9.1}, "dm": 9.3, "cu": {"v": 102.5, "p": 84.4}, "cm": 107.1, "tx": {"v": 0.4, "p": null}, "mpc": 19.5, "ia": {"v": null, "p": null}, "ppn": null, "cpn": null, "nu": {"v": null, "p": null}}, {"name": "Pci - Atlanta", "score": 46, "sc": {"v": 80.2, "p": 61.3}, "del": {"v": 16.5, "p": 17.6}, "dm": 16.5, "cu": {"v": 81.2, "p": 77.1}, "cm": 79.4, "tx": {"v": 2.2, "p": 1.9}, "mpc": 21.1, "ia": {"v": 100.0, "p": null}, "ppn": 6.3, "cpn": 3.2, "nu": {"v": 60.8, "p": 58.3}}, {"name": "Pci Fayatteville", "score": 38, "sc": {"v": 74.2, "p": 59.0}, "del": {"v": 22.4, "p": 23.6}, "dm": 23.4, "cu": {"v": 77.6, "p": 78.4}, "cm": 77.0, "tx": {"v": 0.7, "p": 0.0}, "mpc": 10.5, "ia": {"v": 100.0, "p": null}, "ppn": 6.0, "cpn": 2.6, "nu": {"v": 60.8, "p": 58.2}}, {"name": "Pci LocustGrove", "score": 73, "sc": {"v": 95.3, "p": 87.7}, "del": {"v": 4.9, "p": 5.7}, "dm": 4.6, "cu": {"v": 45.1, "p": 42.8}, "cm": 29.9, "tx": {"v": 0.1, "p": 0.0}, "mpc": 15.0, "ia": {"v": null, "p": null}, "ppn": null, "cpn": null, "nu": {"v": null, "p": null}}, {"name": "Pcinewnan", "score": 49, "sc": {"v": 68.9, "p": 52.5}, "del": {"v": 13.2, "p": 14.0}, "dm": 12.6, "cu": {"v": 123.0, "p": 116.8}, "cm": 113.7, "tx": {"v": 0.7, "p": 0.3}, "mpc": 12.6, "ia": {"v": 100.0, "p": null}, "ppn": 6.1, "cpn": 2.7, "nu": {"v": 64.4, "p": 66.1}}, {"name": "PciSandySprings", "score": 63, "sc": {"v": 95.4, "p": 83.3}, "del": {"v": 10.2, "p": 13.7}, "dm": 9.1, "cu": {"v": 41.7, "p": 39.6}, "cm": 38.9, "tx": {"v": 0.2, "p": null}, "mpc": 10.8, "ia": {"v": null, "p": null}, "ppn": null, "cpn": null, "nu": {"v": null, "p": null}}, {"name": "PciStockbridge", "score": 75, "sc": {"v": 87.2, "p": 72.2}, "del": {"v": 14.7, "p": 19.0}, "dm": 15.3, "cu": {"v": 87.4, "p": 83.0}, "cm": 76.2, "tx": {"v": 0.2, "p": null}, "mpc": 5.8, "ia": {"v": 100.0, "p": null}, "ppn": 6.4, "cpn": 3.7, "nu": {"v": 67.2, "p": 62.2}}], "ins": {"es": "PCI's February 2026 portfolio shows a network-wide pattern of scheduler compliance recovery, with four clinics posting month-over-month gains of 25\u201343 percentage points from January baselines. However, performance variance remains pronounced: our highest-scoring location (PciStockbridge at 75/100, where 50 = network average) coexists with underperformers, and two clinics warrant targeted operational review. Overall, the network's scheduler compliance of 77.84% and average delay of 13.18 minutes represent a stabilizing baseline, though asset utilization and closing-time discipline diverge significantly by location.", "hi": "PciStockbridge delivered exceptional operational efficiency in February, posting a composite score of 75 out of 100 (where 50 represents the network average) and reducing minutes past close per patient from 22.2 in January to 5.8 in February\u2014a 74.2% improvement. Fayatteville - SI demonstrated equally noteworthy scheduler compliance recovery, climbing from 54.5% in January to 78.1% in February, now aligning closely with the company average of 77.84%; this 43.3-point gain suggests sustained traction on scheduling discipline across the Southeast portfolio.", "ae": "Pci Fayatteville's average patient delay of 22.4 minutes sits 69.9% above the company average of 13.18 minutes and represents the largest operational gap in our network; we noticed this clinic's chair utilization remains modest at 77.6% despite scheduling challenges, which may suggest flow bottlenecks unrelated to volume. Pci - Atlanta's treatments running past closing time averaged 2.2 per day in February, exceeding the company median of 0.7 by 245.3%, and nurse utilization has declined steadily to 60.8% over the past two months (3-month average: 60.5%), suggesting potential misalignment between staffing levels and scheduled capacity. Both warrant exploration of root causes distinct from compliance metrics.", "rc": "We recommend reviewing Pci Fayatteville's scheduling templates and nurse-to-chair assignment protocols to diagnose why delay persists at 22.4 minutes despite reasonable compliance gains elsewhere in the network. A concrete first step would be to audit one week of assignments using iOptimize recommendations side-by-side with actual chair staging times to identify whether the delay stems from template design, nurse allocation, or patient flow sequencing\u2014this can be completed within two weeks and will inform a targeted pilot if needed."}};

var NAVY="#1B2A4A",TEAL="#2C7A7B",GREEN="#276749";

function fmt(v, dec, su) {
  if(v == null) return "—";
  return v.toFixed(dec||1) + (su||"");
}

function delta(v, p, higher_better) {
  if(v==null||p==null) return "";
  var d = v - p;
  if(Math.abs(d) < 0.05) return '<span style="color:#A0AEC0;font-size:10px"> →</span>';
  var good = higher_better ? d > 0 : d < 0;
  var arrow = d > 0 ? "↑" : "↓";
  var color = good ? "#276749" : "#9B2335";
  return '<span style="color:'+color+';font-size:10px;font-weight:600;margin-left:4px">'+arrow+Math.abs(d).toFixed(1)+'</span><span style="color:#A0AEC0;font-size:9px;margin-left:3px">(was '+p.toFixed(1)+')</span>';
}

function cellClass(v, b, higher_better) {
  if(v==null) return "dash";
  if(b==null) return "";
  var diff = v - b, thresh = Math.abs(b)*0.05;
  if(Math.abs(diff) <= thresh) return "neutral";
  if((diff>0) === higher_better) return "above";
  return "below";
}

function badge(s) {
  var cls = s>=60?"green":s<40?"red":"yellow";
  return '<span class="badge '+cls+'">'+s+'</span>';
}

function scoreColor(s) {
  return s>=60?"green":s<40?"red":"yellow";
}

// Summary cards
function avgLocs(field, sub) {
  var vals = DATA.locs.map(function(l){ return sub ? l[field][sub] : l[field]; }).filter(function(v){ return v!=null; });
  return vals.length ? vals.reduce(function(a,b){return a+b},0)/vals.length : null;
}
var avgScore = DATA.locs.length ? Math.round(DATA.locs.reduce(function(s,l){return s+(l.score||50)},0)/DATA.locs.length) : 50;
var avgDel=avgLocs("del","v"), avgDelP=avgLocs("del","p");
var avgTx=avgLocs("tx","v"),  avgTxP=avgLocs("tx","p");
var avgSc=avgLocs("sc","v"),  avgScP=avgLocs("sc","p");
var avgCu=avgLocs("cu","v"),  avgCuP=avgLocs("cu","p");

function pctChange(c,p) {
  if(c==null||p==null||p===0) return null;
  return ((c-p)/Math.abs(p)*100).toFixed(1);
}

function kpiChangeHtml(curr, prev, good) {
  var pct = pctChange(curr, prev);
  if(pct==null) return '<p class="kpi-change none">No prior month data</p>';
  var sign = Number(pct)>0?"+":"";
  var cls = good ? "good" : "bad";
  return '<p class="kpi-change '+cls+'">'+sign+pct+'% vs prior month</p>';
}

// Bar chart
function barChart(title, items, refVal, refLabel, lowerBetter, suffix) {
  suffix = suffix || "%";
  if(!items || items.length === 0) return '<div class="chart-section"><div class="chart-title">'+title+'</div><p style="color:#94a3b8;font-size:12px">No data</p></div>';
  var display = items;
  if(items.length > 20) {
    var sorted = items.slice().sort(function(a,b){ return lowerBetter ? a.v-b.v : b.v-a.v; });
    var top10 = sorted.slice(0,10);
    var bot10 = sorted.slice(-10);
    var seen = {};
    display = [];
    top10.concat(bot10).forEach(function(x){ if(!seen[x.name]){ seen[x.name]=1; display.push(x); } });
  }
  var maxV = Math.max.apply(null, display.map(function(d){return d.v||0}).concat([refVal||0])) * 1.2 || 10;
  var barColor = function(v) {
    if(refVal==null) return TEAL;
    if(lowerBetter) return v<=refVal ? TEAL : v>refVal*1.15 ? "#E53E3E" : "#DD6B20";
    return v>=refVal ? TEAL : v<refVal*0.85 ? "#E53E3E" : "#DD6B20";
  };
  var refPct = refVal ? (refVal/maxV*100) : null;
  var barsHtml = display.map(function(item) {
    var h = item.v ? (item.v/maxV*100) : 0;
    return '<div class="bar-col">'+
      '<div class="bar-val">'+item.v.toFixed(1)+suffix+'</div>'+
      '<div class="bar" style="height:'+h+'%;background:'+barColor(item.v)+';width:100%"></div>'+
      '<div class="bar-name">'+item.name+'</div>'+
    '</div>';
  }).join('');
  var refHtml = refPct ? '<div class="ref-line" style="bottom:'+refPct+'%"><span class="ref-label">'+refLabel+' ('+refVal.toFixed(1)+suffix+')</span></div>' : '';
  var note = items.length>20 ? '<p style="font-size:11px;color:#718096;margin-top:8px;font-style:italic">Showing top 10 and bottom 10 of '+items.length+' locations</p>' : '';
  return '<div class="chart-section">'+
    '<div class="chart-title">'+title+'</div>'+
    '<div class="bar-chart">'+
      '<div class="bar-wrap" style="position:relative">'+refHtml+barsHtml+'</div>'+
    '</div>'+note+
  '</div>';
}

function render() {
  var co = DATA.co, locs = DATA.locs, ins = DATA.ins;

  var html = '';

  // Summary cards
  html += '<div class="cards">';
  html += '<div class="card"><p class="card-label">Locations</p><p class="card-val">'+DATA.loc_count+'</p><p class="card-sub">Active clinics</p></div>';
  html += '<div class="card"><p class="card-label">Avg Performance Score</p><p class="card-val '+(avgScore>=50?"good":"")+'">'+avgScore+'</p><p class="card-sub">Network avg: 50</p></div>';
  html += '<div class="card"><p class="card-label">Company Avg Compliance</p><p class="card-val">'+(co.sc?co.sc.toFixed(1)+"%":"—")+'</p><p class="card-sub">Scheduler compliance</p></div>';
  html += '<div class="card"><p class="card-label">Company Avg Delay</p><p class="card-val">'+(co.del?co.del.toFixed(1)+" min":"—")+'</p><p class="card-sub">Patient wait time</p></div>';
  html += '</div>';

  // KPI change cards
  html += '<p style="text-align:center;font-size:14px;font-weight:700;color:'+TEAL+';text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px">Change Since Prior Month (Company Average)</p>';
  html += '<div class="kpi-cards">';
  var kpis = [
    {title:"Treatment Delay", val:avgDel, suf:" min", color:"#38BDF8", good:avgDel!=null&&avgDelP!=null&&avgDel<avgDelP, prev:avgDelP},
    {title:"Extended Hours", val:avgTx, suf:"/day", color:"#FB923C", good:avgTx!=null&&avgTxP!=null&&avgTx<avgTxP, prev:avgTxP},
    {title:"Scheduler Compliance", val:avgSc, suf:"%", color:"#2DD4BF", good:avgSc!=null&&avgScP!=null&&avgSc>avgScP, prev:avgScP},
    {title:"Chair Utilization", val:avgCu, suf:"%", color:"#C084FC", good:avgCu!=null&&avgCuP!=null&&avgCu>avgCuP, prev:avgCuP}
  ];
  kpis.forEach(function(k) {
    html += '<div class="kpi-card"><div class="kpi-bar" style="background:'+k.color+'"></div><div class="kpi-inner">';
    html += '<p class="kpi-title">'+k.title+'</p>';
    html += '<p class="kpi-value" style="color:'+k.color+'">'+(k.val!=null?k.val.toFixed(k.suf==="/day"?2:1)+k.suf:"—")+'</p>';
    html += kpiChangeHtml(k.val, k.prev, k.good);
    html += '</div></div>';
  });
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  ['overview','ioptimize','iassign','charts'].forEach(function(t,i) {
    var labels = ['Performance Overview','iOptimize Metrics','iAssign Metrics','Charts'];
    html += '<button class="tab'+(i===0?' active':'')+'" onclick="switchTab(''+t+'')" id="tab-'+t+'">'+labels[i]+'</button>';
  });
  html += '</div>';

  // Overview tab
  html += '<div class="tab-content active" id="content-overview">';
  if(ins.es) html += '<div class="section-box"><div class="section-title">Performance Overview</div><p class="prose">'+ins.es+'</p></div>';
  if(ins.hi||ins.ae) {
    html += '<div class="two-col">';
    if(ins.hi) html += '<div class="insight-green"><div class="insight-label">What's Working Well</div><p class="prose">'+ins.hi+'</p></div>';
    if(ins.ae) html += '<div class="insight-blue"><div class="insight-label">Areas to Explore</div><p class="prose">'+ins.ae+'</p></div>';
    html += '</div>';
  }
  if(ins.rc) html += '<div class="insight-navy"><div class="insight-label">How We Can Help</div><p class="prose">'+ins.rc+'</p></div>';
  html += '<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8;margin-bottom:12px">Clinic Performance Scores</p>';
  html += '<div class="score-grid">';
  locs.forEach(function(l) {
    var sc = l.score||50;
    html += '<div class="score-card">';
    html += '<div class="score-header"><span class="score-name">'+l.name+'</span>'+badge(sc)+'</div>';
    html += '<div class="score-kpis">';
    [{'lb':'Compliance','f':'sc','su':'%','h':true},{'lb':'Avg Delay','f':'del','su':' min','h':false},{'lb':'Chair Util','f':'cu','su':'%','h':true}].forEach(function(k) {
      var v = l[k.f].v, p = l[k.f].p;
      var dlt = delta(v, p, k.h);
      html += '<div>';
      html += '<p class="score-kpi-label">'+k.lb+'</p>';
      html += '<p class="score-kpi-val">'+(v!=null?v.toFixed(1)+k.su:"—")+'</p>';
      if(dlt) html += '<div>'+dlt+'</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="progress-wrap"><div class="progress-labels"><span>0</span><span>Network Avg (50)</span><span>100</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill '+scoreColor(sc)+'" style="width:'+Math.min(sc,100)+'%"></div><div class="progress-mid"></div></div></div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<p class="footnote">Performance Score: weighted blend of compliance (25%), delay (20%), chair utilization (20%), iAssign adoption (15%), overtime (10%), and nurse utilization (10%). 50 = network average, 100 = top decile.</p>';
  html += '</div>';

  // iOptimize tab
  html += '<div class="tab-content" id="content-ioptimize">';
  html += '<div class="section-box">';
  html += '<div class="section-title">iOptimize &mdash; Scheduling &amp; Flow Metrics</div>';
  html += '<p style="font-size:11px;color:#718096;margin-bottom:12px">Colour coding vs company average &middot; Arrows show MoM change with prior value</p>';
  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th class="left">Location</th><th>Scheduler Compliance</th><th>Avg Delay (min)</th><th>Median Delay</th><th>Chair Utilization</th><th>Chair Util. Median</th><th>Tx Past Close</th><th>Mins Past Close / Pt</th></tr></thead><tbody>';
  locs.forEach(function(l) {
    html += '<tr>';
    html += '<td class="left">'+l.name+badge(l.score||50)+'</td>';
    html += '<td class="'+cellClass(l.sc.v,co.sc,true)+'">'+(l.sc.v!=null?l.sc.v.toFixed(1)+"%":"—")+delta(l.sc.v,l.sc.p,true)+'</td>';
    html += '<td class="'+cellClass(l.del.v,co.del,false)+'">'+(l.del.v!=null?l.del.v.toFixed(1)+" min":"—")+delta(l.del.v,l.del.p,false)+'</td>';
    html += '<td>'+(l.dm!=null?l.dm+" min":"—")+'</td>';
    html += '<td class="'+cellClass(l.cu.v,co.cu,true)+'">'+(l.cu.v!=null?l.cu.v.toFixed(1)+"%":"—")+delta(l.cu.v,l.cu.p,true)+'</td>';
    html += '<td>'+(l.cm!=null?l.cm+"%":"—")+'</td>';
    html += '<td class="'+cellClass(l.tx.v,0.5,false)+'">'+(l.tx.v!=null?l.tx.v.toFixed(1)+"/day":"—")+delta(l.tx.v,l.tx.p,false)+'</td>';
    html += '<td>'+l.mpc+' min</td>';
    html += '</tr>';
  });
  if(co.sc) {
    html += '<tr class="avg-row"><td class="left">Company Average</td><td>'+co.sc.toFixed(1)+'%</td><td>'+(co.del?co.del.toFixed(1)+' min':'—')+'</td><td></td><td>'+(co.cu?co.cu.toFixed(1)+'%':'—')+'</td><td></td><td></td><td></td></tr>';
  }
  html += '</tbody></table></div>';
  html += '<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#C6F6D5;border:1px solid #9ae6b4"></span>Above avg</span><span class="legend-item"><span class="legend-dot" style="background:#FED7D7;border:1px solid #feb2b2"></span>Below avg</span><span class="legend-item"><span class="legend-dot" style="background:#EDF2F7;border:1px solid #CBD5E0"></span>Within 5%</span></div>';
  html += '</div></div>';

  // iAssign tab
  html += '<div class="tab-content" id="content-iassign">';
  html += '<div class="section-box">';
  html += '<div class="section-title">iAssign &mdash; Staffing &amp; Nurse Metrics</div>';
  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th class="left">Location</th><th>iAssign Utilization</th><th>Patients / Nurse</th><th>Chairs / Nurse</th><th>Nurse Utilization</th></tr></thead><tbody>';
  locs.forEach(function(l) {
    html += '<tr>';
    html += '<td class="left">'+l.name+'</td>';
    html += '<td style="background:#C6F6D5;color:#276749;font-weight:600">'+(l.ia.v!=null?l.ia.v.toFixed(1)+"%":"—")+'</td>';
    html += '<td>'+(l.ppn!=null?l.ppn:"—")+'</td>';
    html += '<td>'+(l.cpn!=null?l.cpn:"—")+'</td>';
    html += '<td class="'+cellClass(l.nu.v,67,true)+'">'+(l.nu.v!=null?l.nu.v.toFixed(1)+"%":"—")+delta(l.nu.v,l.nu.p,true)+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div></div>';

  // Charts tab
  html += '<div class="tab-content" id="content-charts">';
  html += '<div class="charts-grid">';
  html += barChart("Scheduler Compliance by Location", locs.filter(function(l){return l.sc.v!=null}).map(function(l){return{name:l.name,v:l.sc.v}}) , co.sc, "Company Avg", false, "%");
  html += barChart("Avg Delay Before Treatment", locs.filter(function(l){return l.del.v!=null}).map(function(l){return{name:l.name,v:l.del.v}}), co.del, "Company Avg", true, " min");
  html += barChart("Chair Utilization by Location", locs.filter(function(l){return l.cu.v!=null}).map(function(l){return{name:l.name,v:l.cu.v}}), co.cu, "Company Avg", false, "%");
  html += barChart("iAssign Utilization by Location", locs.filter(function(l){return l.ia&&l.ia.v!=null}).map(function(l){return{name:l.name,v:l.ia.v}}), null, "", false, "%");
  html += '</div></div>';

  // Footer
  html += '<footer>PCI &middot; February 2026 Clinic Health Report &middot; Prepared by the OncoSmart Analytics Team<br>Confidential &mdash; for internal review only</footer>';

  document.getElementById('app').innerHTML = html;
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('content-'+id).classList.add('active');
}

render();
</script>
</body>
</html>
