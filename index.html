        e(RBC,{data:LOCS.map(function(l){return{name:l.name,value:l.del.v}}),bv:CO.del,bl:"Company Avg",title:"Avg Delay Before Treatment",yl:"Minutes",lo:true,su:" min"}),

        e(RBC,{data:LOCS.map(function(l){return{name:l.name,value:l.ia.v}}),bv:null,bl:"",title:"iAssign Utilization by Location",yl:"iAssign Utilization (%)",su:"%"})),

      // FOOTER
      e("div",{style:{marginTop:48,textAlign:"center",fontSize:11,color:"#94a3b8",padding:"20px 0",borderTop:"1px solid #E2E8F0"}},
        "NCS \u00b7 February 2026 Clinic Health Report \u00b7 Prepared by the OncoSmart Analytics Team",e("br"),"Confidential \u2014 for internal review only")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
